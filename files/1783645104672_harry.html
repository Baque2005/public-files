<!DOCTYPE html><html lang='es'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1.0'><title>Mi Patronus</title><style>*{margin:0;padding:0;box-sizing:border-box;font-family:Georgia}body{overflow:hidden;background:radial-gradient(circle,#081229,#020510);height:100vh;display:flex;justify-content:center;align-items:center;color:#fff;position:relative}.star{position:absolute;background:#fff;border-radius:50%;animation:b 2s infinite alternate}@keyframes b{from{opacity:.2}to{opacity:1}}.c{text-align:center;z-index:2}h1{text-shadow:0 0 15px cyan;margin-bottom:30px}.w{font-size:70px;cursor:pointer}#ray{position:absolute;left:50%;top:48%;height:4px;width:0;background:cyan;transition:1s;box-shadow:0 0 20px cyan}#cat{position:absolute;left:-120px;top:55%;opacity:0;font-size:80px;filter:drop-shadow(0 0 20px cyan)}#end{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);transition:1s;text-align:center}.heart{font-size:120px;animation:p 1s infinite}@keyframes p{50%{transform:scale(1.2)}}</style></head><body><script>for(let i=0;i<180;i++){let s=document.createElement('div');s.className='star';let t=Math.random()*3+1;s.style.width=t+'px';s.style.height=t+'px';s.style.left=Math.random()*100+'vw';s.style.top=Math.random()*100+'vh';document.body.appendChild(s)}</script><div class='c'><h1>Tú eres mi Espectro Patronum ✨</h1><div class='w' onclick='pat()'>🪄</div></div><div id='ray'></div><div id='cat'>🐈‍⬛✨</div><div id='end'><div class='heart'>❤️</div><p>Siempre serás la luz que guía mi corazón.</p></div><script>function pat(){ray.style.width='350px';setTimeout(()=>{cat.style.opacity=1;let x=-120;let c=setInterval(()=>{x+=12;cat.style.left=x+'px';if(x>innerWidth){clearInterval(c);cat.style.opacity=0;end.style.transform='translate(-50%,-50%) scale(1)'}},20)},700)}</script></body></html>
