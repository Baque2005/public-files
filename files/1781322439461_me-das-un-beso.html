<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quieres ser?</title>
    <style>
    body {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        background-color: #ffffff;
    }

    .container {
        text-align: center;
    }

    #gifContainerImg {
        width: 60%;
        height: 60%;
    }

    button {
        padding: 10px 20px;
        font-size: 16px;
        margin: 10px;
        cursor: pointer;
    }
    #siBtn {
        padding: 10px 20px; 
        font-size: 16px;
        margin: 10px;
        cursor: pointer;
        background-color: #009705; /* Verde */
        color: white;
        border: 2px solid #FFC0CB; /* Bordes rosa */
        border-radius: 10px; /* Esquinas redondeadas */
    }

    #noBtn {
        padding: 10px 20px;
        font-size: 16px;
        margin: 10px;
        cursor: pointer;
        background-color: #FF5733; /* Rojo */
        color: white;
        border: 2px solid #FFC0CB; /* Bordes rosa */
        border-radius: 10px; /* Esquinas redondeadas */
    }
    #noBtn span {
        font-size: 18px;
        color: #fcf4f4; /* Cambia el color del texto según tus preferencias */
        /* Otras propiedades de estilo aquí */
    }

    #siBtn:hover{
        background-color: #053a03; /* Cambia a otro color en hover, puedes ajustar el valor según tus preferencias */
    }
    #noBtn:hover {
        background-color: #641e0d; /* Cambia a otro color en hover, puedes ajustar el valor según tus preferencias */
    }
    .bg-green {
        background-color: #ffffff; /* Nuevo color de fondo verde */
    }

    #messageContainer {
        font-size: 30px;
        color: #FF0000; /* Color rojo */
        font-family: 'YourDesiredFont', sans-serif; /* Reemplaza 'YourDesiredFont' con la fuente que desees */
        text-shadow: 2px 2px 4px #000; /* Borde simulado */
        animation: pulse 0.5s infinite alternate; /* Animación de palpitación más rápida */
    }

    @keyframes pulse {
        from {
            transform: scale(1);
        }
        to {
            transform: scale(1.3); /* Zoom más grande */
        }
    }
    </style>
</head>
<body>
    <div class="container">
        <div id="gifContainer">
            <img id="gifContainerImg" src="https://i.pinimg.com/736x/fd/ea/5a/fdea5a8c23cc8f603965d8d0fe892376.jpg" alt="Imagen Inicial">
        </div>

    <!-- Pregunta actualizada -->
    <h1 id="question">¿Me das un beso?</h1>
        <div id="messageContainer" style="display: none;"></div>

        <button id="siBtn">Sí</button>
        <button id="noBtn">No</button>
        
    </div>
    <script>
    const gifContainer = document.getElementById('gifContainer');
    const gifContainerImg = document.getElementById('gifContainerImg');
    const questionEl = document.getElementById('question');
    const messageContainer = document.getElementById('messageContainer');
    const siBtn = document.getElementById('siBtn');
    const noBtn = document.getElementById('noBtn');
    const container = document.querySelector('.container');

    let noButtonState = 0;
    let currentSadImg = null;

    const noMessages = [
        '¿No quieres darme un beso?',
        'Vamos, solo uno corto',
        'Por favor, solo un beso en la mejilla',
        'Solo un beso, no seas tímida',
        '¿Y solo un beso de esquimal?',
        '¿Ni siquiera un beso en la mano?',
        'No, pero pienso robarte un beso más tarde',
        'Solo un beso, por favor',
        'Un beso es todo lo que pido',
        'Vamos, ni siquiera un beso rápido',
        'Al menos dame un beso en la mejilla',
        'No puedo creer que no quieras un beso',
        'Te prometo que será rápido',
        'Solo dame un beso y ya',
        '¿De verdad no quieres besarme?',
        'No te arrepentirás, solo un beso',
        'No terminaré hasta que me des ese beso'
    ];

    const sadImages = [
        'https://i.pinimg.com/736x/fd/ea/5a/fdea5a8c23cc8f603965d8d0fe892376.jpg',
        'https://i.pinimg.com/736x/aa/b9/01/aab9012fecab26a1e74942e638ea3746.jpg',
        'https://i.pinimg.com/736x/f0/db/89/f0db89944ed03e4328337c5f9d42a3a3.jpg',
        'https://i.pinimg.com/736x/a2/21/0c/a2210c96613f918ec43f2ebbe4996d79.jpg',
        'https://i.pinimg.com/736x/fb/60/1e/fb601ee330dfb714d85e5c2b8ff3107c.jpg',
        'https://i.pinimg.com/736x/52/56/14/52561495c9fa4914761e617981086ca3.jpg',
        'https://i.pinimg.com/736x/8d/55/3b/8d553b1699cb6ab6036820bd0effa614.jpg'
    ];

    function removeCurrentSadImage() {
        if (currentSadImg) {
            currentSadImg.remove();
            currentSadImg = null;
        }
    }

    function showSadImage(index) {
        removeCurrentSadImage();
        const src = sadImages[index];
        if (!src) return;
        currentSadImg = document.createElement('img');
        currentSadImg.src = src;
        currentSadImg.alt = 'Imagen triste';
        currentSadImg.style.width = '80%';
        currentSadImg.style.height = '80%';
        currentSadImg.style.display = 'block';
        currentSadImg.style.margin = '0 auto 20px';
        container.insertBefore(currentSadImg, questionEl);
    }

    function showSuccessMessage() {
        gifContainer.style.display = 'none';
        removeCurrentSadImage();
        questionEl.style.display = 'none';
        siBtn.style.display = 'none';
        noBtn.style.display = 'none';
        document.body.classList.add('bg-green');
        messageContainer.style.display = 'block';
        messageContainer.innerHTML = 'Yei! muchas gracias por darme un beso, te quiero mucho!';

        let gifContainerFinal = document.getElementById('gifContainerFinal');
        if (!gifContainerFinal) {
            gifContainerFinal = document.createElement('div');
            gifContainerFinal.id = 'gifContainerFinal';
            gifContainerFinal.style.marginTop = '20px';
            gifContainerFinal.style.display = 'flex';
            gifContainerFinal.style.justifyContent = 'center';
            gifContainerFinal.style.alignItems = 'center';
            const gif = document.createElement('img');
            gif.src = 'https://i.pinimg.com/originals/88/14/9b/88149b0400750578f4d07d9bc3fb0fee.gif';
            gif.alt = 'Celebración';
            gif.style.maxWidth = '80%';
            gif.style.maxHeight = '400px';
            gifContainerFinal.appendChild(gif);
            container.appendChild(gifContainerFinal);
        } else {
            gifContainerFinal.style.display = 'flex';
        }
    }

    siBtn.addEventListener('click', showSuccessMessage);

    noBtn.addEventListener('click', function() {
        if (noButtonState >= noMessages.length) {
            noButtonState = 0;
            noBtn.textContent = noMessages[0];
            removeCurrentSadImage();
            gifContainer.style.display = 'block';
            return;
        }

        if (noButtonState === 0) {
            gifContainer.style.display = 'none';
        }

        noBtn.textContent = noMessages[noButtonState];
        noBtn.style.backgroundColor = '#F1330A';
        const fontSize = 40 + Math.min(noButtonState, 6) * 10;
        const padding = 20 + Math.min(noButtonState, 6) * 10;
        siBtn.style.fontSize = fontSize + 'px';
        siBtn.style.padding = padding + 'px ' + (padding + 20) + 'px';

        showSadImage(Math.min(noButtonState + 1, sadImages.length - 1));

        noButtonState++;
    });
    </script>
</body>
</html>
