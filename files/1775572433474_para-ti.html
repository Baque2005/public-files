<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Ti ❤️</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
            margin: 0;
            padding: 0;
            text-align: center;
            color: #333;
        }
        header {
            padding: 30px;
            font-size: 28px;
            font-weight: bold;
        }
        main {
            padding: 20px;
        }
        .card {
            background: white;
            padding: 20px;
            margin: auto;
            width: 80%;
            max-width: 400px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        button {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 15px;
            background: #ff6b81;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    💖 Para la persona más especial 💖
</header>

<main>
    <div class="card">
        <p>
            Desde que llegaste a mi vida, todo es más bonito.
            Tu sonrisa, tu forma de ser, todo de ti me encanta ❤️
        </p>
        <p>
            Solo quería recordarte lo importante que eres para mí...
        </p>
        <button onclick="mensaje()">Presiona aquí 💌</button>
    </div>
</main>

<script>
    function mensaje() {
        alert('Te quiero mucho ❤️');
    }
</script>

</body>
</html>
