<!DOCTYPE html><html lang='es'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1.0'><title>Tulipanes Eternos</title><style>*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}body{background:linear-gradient(#050816,#101b3a,#1d2951);display:flex;justify-content:center;align-items:center;min-height:100vh;color:#fff;overflow:hidden}.estrellas{position:fixed;inset:0;background-image:radial-gradient(white 1px,transparent 1px),radial-gradient(white 1px,transparent 1px);background-size:70px 70px,120px 120px;animation:m 30s linear infinite}@keyframes m{to{transform:translateY(70px)}}.c{text-align:center;position:relative;z-index:1}.ramo{display:flex;gap:12px;justify-content:center;margin-bottom:20px}.t{position:relative;width:45px;height:190px}.ta{position:absolute;width:5px;height:120px;background:#2ecc71;left:20px;top:60px}.f{position:absolute;width:40px;height:40px;background:#8e44ad;border-radius:50% 50% 0 0;top:25px;left:2px}.f:before,.f:after{content:'';position:absolute;width:22px;height:32px;background:#9b59b6;border-radius:50% 50% 0 0}.f:before{left:-8px;transform:rotate(-25deg)}.f:after{right:-8px;transform:rotate(25deg)}p{margin:20px;font-size:22px}.g{width:170px;height:170px;border-radius:50%;border:none;background:radial-gradient(circle,#6b3f00 25%,#ffeb3b 26%,#ffd600 70%);font-weight:bold;cursor:pointer}.msg{display:none;margin-top:20px}.cont{margin-top:20px;font-size:24px}</style></head><body><div class='estrellas'></div><div class='c'><div class='ramo'><div class='t'><div class='f'></div><div class='ta'></div></div><div class='t'><div class='f'></div><div class='ta'></div></div><div class='t'><div class='f'></div><div class='ta'></div></div><div class='t'><div class='f'></div><div class='ta'></div></div><div class='t'><div class='f'></div><div class='ta'></div></div></div><p>💜 Estas rosas son eternas como mi amor por ti 💜</p><button class='g' onclick="document.getElementById('m').style.display='block'">Hasta que el último pétalo caiga, yo dejaré de amarte.</button><div id='m' class='msg'>🌻 Pero este girasol jamás perderá su último pétalo.</div><div class='cont'>⏳ 6 años • 32 días • 10 horas</div></div></body></html>
