<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Un futuro juntos</title><style>*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}body{overflow:hidden;display:flex;justify-content:center;align-items:center;height:100vh;background:linear-gradient(#020111,#000814)}.space{position:absolute;width:100%;height:100%}.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:move linear infinite}@keyframes move{from{transform:translateY(0)}to{transform:translateY(100vh)}}.container{position:relative;z-index:2;background:rgba(0,0,0,.45);padding:40px;border-radius:20px;color:#fff;text-align:center;animation:float 3s ease-in-out infinite}@keyframes float{50%{transform:translateY(-8px)}}button{padding:15px 30px;margin:10px;border:none;border-radius:30px;cursor:pointer}#respuesta{margin-top:20px;font-size:24px;color:gold}</style></head><body><div class="space" id="space"></div><div class="container"><h1>¿Quién crees que luche por el otro?</h1><button onclick="r1()">Lucharé por ti</button><button onclick="r2()">Lucharás por mí</button><div id="respuesta"></div></div><script>let s=document.getElementById('space');for(let i=0;i<250;i++){let d=document.createElement('div');d.className='star';d.style.left=Math.random()*100+'vw';d.style.top=Math.random()*100+'vh';let z=Math.random()*3+1;d.style.width=z+'px';d.style.height=z+'px';d.style.animationDuration=(Math.random()*8+4)+'s';s.appendChild(d)}function r1(){respuesta.textContent='✨ Lo vamos a lograr ✨'}function r2(){respuesta.textContent='💖 Por un futuro juntos. 💖'}</script></body></html>
