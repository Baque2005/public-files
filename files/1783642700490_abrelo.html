<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>💍 Propuesta</title>
<style>*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}body{overflow:hidden;height:100vh;display:flex;justify-content:center;align-items:center;text-align:center;color:#fff;background:radial-gradient(circle at top,#243d22,#0b170b 75%)}body:before{content:"";position:absolute;inset:0;background:linear-gradient(to right,#111 0 6%,transparent 6% 18%,#111 18% 24%,transparent 24% 40%,#111 40% 46%,transparent 46% 60%,#111 60% 66%,transparent 66% 80%,#111 80% 86%,transparent 86%)}body:after{content:"";position:absolute;inset:0;background-image:radial-gradient(circle,#ffd84d 2px,transparent 4px),radial-gradient(circle,#ffef9c 2px,transparent 4px);background-size:80px 80px;animation:b 2s infinite alternate}@keyframes b{from{filter:brightness(.8)}to{filter:brightness(1.5)}}.c{position:relative;z-index:1;background:rgba(0,0,0,.45);padding:35px;border-radius:20px}.a{font-size:90px;animation:g 3s infinite}@keyframes g{50%{transform:scale(1.1) rotate(10deg)}}button{margin:8px;padding:14px 24px;border:none;border-radius:30px;cursor:pointer}#r{margin-top:20px;font-size:22px}#e{font-size:14px;color:#fff4b0}</style></head><body><div class="c"><div class="a">💍</div><h1>Tu y yo, nos vamos a casar</h1><button onclick="si()">Sí</button><button onclick="no()">No</button><button onclick="talvez()">Tal vez</button><div id="r"></div><div id="e"></div></div><script>function si(){r.innerHTML='💛 Me debes una vida juntos 💛';e.innerHTML=''}function no(){r.innerHTML='😏 Creíste que aceptaría un no por respuesta';e.innerHTML=''}function talvez(){si();e.innerHTML='Me creíste que te iba a dejar 😘'}</script></body></html>
