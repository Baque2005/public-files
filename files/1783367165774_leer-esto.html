<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>¿Me perdonas?</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#ffffff;
overflow:hidden;
}

.contenedor{
text-align:center;
transition:.4s;
padding:20px;
}

#gatito{
width:260px;
height:260px;
object-fit:cover;
border-radius:18px;
transition:.4s;
}

h1{
margin-top:20px;
font-size:38px;
color:#222;
}

.botones{
margin-top:30px;
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

button{
padding:15px 35px;
font-size:24px;
border:none;
border-radius:12px;
cursor:pointer;
transition:.3s;
font-weight:bold;
}

#si{
background:#4CAF50;
color:white;
}

#no{
background:#ff5d73;
color:white;
}

.final{
display:none;
text-align:center;
animation:aparecer .6s;
}

.final img{
width:260px;
border-radius:18px;
}

.final h2{
margin-top:20px;
font-size:42px;
color:#ff4d88;
}

.final p{
margin-top:10px;
font-size:22px;
color:#555;
}

.corazon{
position:fixed;
font-size:28px;
animation:subir linear forwards;
pointer-events:none;
}

@keyframes subir{
0%{
transform:translateY(0);
opacity:1;
}

100%{
transform:translateY(-110vh);
opacity:0;
}
}

@keyframes aparecer{
from{
opacity:0;
transform:scale(.8);
}

to{
opacity:1;
transform:scale(1);
}
}

</style>

</head>

<body>

<div class="contenedor" id="pantalla1">

<img
id="gatito"
src="conejito.png"
alt="Conejito">

<h1 id="pregunta">
¿Me perdonas? 🥺
</h1>

<div class="botones">

<button id="si">
Sí 💚
</button>

<button id="no">
No 💔
</button>

</div>

</div>

<div class="final" id="pantalla2">

<img
src="gatito1.png"
alt="Gatito feliz">

<h2>
💖 Prometo mejorar enserio
</h2>

<p>
Gracias por darme otra oportunidad Edgar.
</p>

</div>

<script>

const botonSi=document.getElementById("si");
const botonNo=document.getElementById("no");

const pregunta=document.getElementById("pregunta");

const gatito=document.getElementById("gatito");

const pantalla1=document.getElementById("pantalla1");

const pantalla2=document.getElementById("pantalla2");

let tamaño=1;

let intento=0;

const frases=[

"¿Seguro? 🥺",

"¿De verdad? 😿",

"¿Ni un poquito? ",

"Prometo mejorar ",

"Por favor 🥹",

"No seas malito 😭",

"Te invito un helado 🍦",

"porfiss 😿",

"¿Última oportunidad? 💖",

"Ya casi te di que si 🥺",

"¿Sí? ❤️"

];

const gatos=[

"gatito1.png",

"gatito2.png",

"perrito.png",

"ratoncito.png"


];
botonNo.addEventListener("click",()=>{

    intento++;

    if(intento<gatos.length){
        gatito.src=gatos[intento];
    }

    botonNo.innerHTML=frases[intento%frases.length];

    tamaño+=0.35;

    botonSi.style.transform=`scale(${tamaño})`;

    botonNo.style.transform=`scale(${Math.max(.35,1-intento*0.08)})`;

    if(tamaño>3){
        botonSi.style.fontSize="36px";
        botonSi.style.padding="25px 60px";
    }

    if(tamaño>5){
        botonSi.style.position="fixed";
        botonSi.style.left="50%";
        botonSi.style.top="50%";
        botonSi.style.transform="translate(-50%,-50%) scale(6)";
        botonNo.style.opacity=".4";
    }

});

botonSi.addEventListener("click",()=>{

    pantalla1.style.display="none";
    pantalla2.style.display="block";

    for(let i=0;i<60;i++){

        let c=document.createElement("div");

        c.className="corazon";
        c.innerHTML=["💖","💕","❤️","💗"][Math.floor(Math.random()*4)];

        c.style.left=Math.random()*100+"vw";
        c.style.top="100vh";
        c.style.fontSize=(20+Math.random()*30)+"px";
        c.style.animationDuration=(2+Math.random()*2)+"s";

        document.body.appendChild(c);

        setTimeout(()=>{
            c.remove();
        },4000);

    }

});

</script>

</body>
</html>
