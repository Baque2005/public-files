<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corazon galaxia</title>
    <style>
        body {
            margin: 0;
            background: radial-gradient(circle at center, #1a001a 0%, #000 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            perspective: 1000px;
        }

        /* Espacio profundo */
        #stars-container {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .main-wrapper {
            position: relative;
            text-align: center;
            z-index: 10;
            transition: transform 0.8s ease-in-out;
            cursor: pointer;
        }

        /* Efecto de acercar al pasar el mouse o tocar */
        .main-wrapper:hover {
            transform: scale(1.3) rotateX(10deg);
        }

        .title-top {
            color: #ff85c1;
            font-size: 2.5rem;
            margin-bottom: 50px;
            text-shadow: 0 0 20px #ff1493;
            animation: float 3s ease-in-out infinite;
        }

        .footer-text {
            color: #ff85c1;
            font-size: 1.5rem;
            margin-top: 80px;
            text-shadow: 0 0 10px #ff1493;
        }

        /* El Corazón CSS */
        .heart {
            position: relative;
            width: 80px;
            height: 80px;
            background-color: #ff1493;
            transform: rotate(-45deg);
            margin: 0 auto;
            animation: heartbeat 1.2s infinite;
            box-shadow: 0 0 50px #ff1493;
            cursor: pointer;
        }

        .heart::before, .heart::after {
            content: "";
            position: absolute;
            width: 80px;
            height: 80px;
            background-color: #ff1493;
            border-radius: 50%;
        }

        .heart::before { top: -40px; left: 0; }
        .heart::after { left: 40px; top: 0; }

        /* Órbita de nombres y estrellas */
        .orbit-system {
            position: absolute;
            top: 50%;
            left: 50%;
            transform-style: preserve-3d;
            z-index: 5;
        }

        .orbiting-element {
            position: absolute;
            color: #ffb6c1;
            white-space: nowrap;
            font-weight: bold;
            font-size: 12px;
            animation: orbit linear infinite;
        }

        @keyframes heartbeat {
            0% { transform: rotate(-45deg) scale(1); }
            15% { transform: rotate(-45deg) scale(1.2); }
            30% { transform: rotate(-45deg) scale(1.1); }
            45% { transform: rotate(-45deg) scale(1.3); }
            100% { transform: rotate(-45deg) scale(1); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes orbit {
            from { transform: rotateY(0deg) translateX(var(--distance)) rotateY(0deg); }
            to { transform: rotateY(360deg) translateX(var(--distance)) rotateY(-360deg); }
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.8;
        }
        .floating-word {
            position: absolute;
            pointer-events: none;
            color: #ffd1e8;
            font-weight: 700;
            text-shadow: 0 2px 8px rgba(0,0,0,0.6);
            mix-blend-mode: screen;
            transition: transform 2s ease-out, opacity 2s ease-out;
            will-change: transform, opacity;
        }
        .orbiting-element {
            mix-blend-mode: screen;
        }
        /* Barra de música fija abajo */
        .music-bar {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            height: 64px;
            background: linear-gradient(90deg, rgba(0,0,0,0.6), rgba(26,0,26,0.6));
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            backdrop-filter: blur(6px);
            padding: 8px 12px;
        }
        .music-bar audio {
            width: min(900px, 96%);
            outline: none;
        }
    </style>
</head>
<body>

    <div id="stars-container"></div>

    <div class="main-wrapper">
        <h1 class="title-top">Te quiero!</h1>
        
        <div class="heart"></div>
        
        <div class="orbit-system" id="orbit-root"></div>

        <p class="footer-text">Solo a ti</p>
    </div>

    <div class="music-bar">
        <audio id="bg-audio" controls preload="auto" crossorigin="anonymous">
            <source src="https://cdn.jsdelivr.net/gh/Baque2005/Organizador@master/As%20The%20World%20Caves%20In%20-%20Matt%20Maltese%20(Cover%20by%20Sarah%20Cothran).mp3" type="audio/mpeg">
            Tu navegador no soporta audio.
        </audio>
    </div>

    <script>
        const orbitRoot = document.getElementById('orbit-root');
        const starsContainer = document.getElementById('stars-container');

        // Crear estrellas de fondo
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3 + 'px';
            star.style.width = size;
            star.style.height = size;
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            starsContainer.appendChild(star);
        }

        // Crear nombres y estrellas orbitando
        const words = [
            'Amor', 'Mi vida', 'Mi cielo', 'Te adoro', 'Mi todo', 'Eres mi sol', 'Para siempre', 'Contigo', 'Beso', 'Abrazo',
            'Mi corazón', 'Luz', 'Pasión', 'Eres tú', 'Mi alma', 'Felicidad', 'Ternura', 'Eternamente', 'Sueño', 'Mi querer'
        ];

        const elementsCount = 30;
        for (let i = 0; i < elementsCount; i++) {
            const el = document.createElement('div');
            el.className = 'orbiting-element';
            
            // Alternar entre palabras de amor y estrellas
            if (i % 2 === 0) {
                el.textContent = words[i % words.length];
                el.style.opacity = '0.95';
                el.style.color = '#ffd1e8';
                el.style.fontSize = (12 + Math.floor(Math.random() * 6)) + 'px';
            } else {
                el.textContent = '✦';
                el.style.opacity = '0.6';
                el.style.fontSize = (10 + Math.floor(Math.random() * 6)) + 'px';
            }

            const distance = 100 + Math.random() * 220;
            const duration = 6 + Math.random() * 12;
            const delay = Math.random() * -20;
            
            el.style.setProperty('--distance', `${distance}px`);
            el.style.animationDuration = `${duration}s`;
            el.style.animationDelay = `${delay}s`;
            
            // Inclinación aleatoria de la órbita para efecto 3D
            el.style.top = (Math.random() * 100 - 50) + 'px';
            el.style.left = (Math.random() * 100 - 50) + 'px';
            el.style.transformOrigin = `-${distance}px 0px`;
            
            orbitRoot.appendChild(el);
        }

        // Animación de clic en el corazón: crecer, explotar y esparcir palabras
        const heart = document.querySelector('.heart');
        let clickCount = 0;

        function createFloatingWord(text) {
            const w = document.createElement('div');
            w.className = 'floating-word';
            w.textContent = text;
            w.style.position = 'absolute';
            w.style.color = '#ffb6d9';
            w.style.fontWeight = '700';
            w.style.left = Math.random() * 100 + 'vw';
            w.style.top = Math.random() * 100 + 'vh';
            w.style.fontSize = (12 + Math.random() * 24) + 'px';
            w.style.opacity = '0';
            w.style.borderRadius = '0';
            w.style.transition = 'transform 12s ease-out, opacity 12s ease-out';

            document.body.appendChild(w);

            requestAnimationFrame(() => {
                w.style.opacity = '1';
                const angle = Math.random() * Math.PI * 2;
                const dist = 200 + Math.random() * 500;
                const tx = Math.cos(angle) * dist;
                const ty = Math.sin(angle) * dist;
                w.style.transform = `translate(${tx}px, ${ty}px) rotate(${Math.random()*360}deg)`;
            });

            setTimeout(() => {
                w.style.opacity = '0';
                setTimeout(() => w.remove(), 12000);
            }, 10000 + Math.random()*8000);
        }

        function explodeHeart() {
            // Generar muchas palabras de amor volando
            for (let i = 0; i < 50; i++) {
                const text = words[Math.floor(Math.random() * words.length)];
                createFloatingWord(text);
            }
            // Pequeña explosión visual
            const burst = document.createElement('div');
            burst.style.position = 'absolute';
            burst.style.left = '50%';
            burst.style.top = '50%';
            burst.style.width = '20px';
            burst.style.height = '20px';
            burst.style.borderRadius = '50%';
            burst.style.background = 'radial-gradient(circle, #fff6, #ff1493)';
            burst.style.transform = 'translate(-50%,-50%) scale(0)';
            burst.style.transition = 'transform 1.8s ease-out, opacity 2.4s';
            document.body.appendChild(burst);
            requestAnimationFrame(() => {
                burst.style.transform = 'translate(-50%,-50%) scale(20)';
                burst.style.opacity = '0';
            });
            setTimeout(() => burst.remove(), 4200);
        }

        function onHeartClick() {
            clickCount++;
            // Reproducir audio al pulsar el corazón (permite autoplay porque es interacción del usuario)
            try {
                const audioEl = document.getElementById('bg-audio');
                if (audioEl) {
                    const p = audioEl.play();
                    if (p && typeof p.then === 'function') {
                        p.catch(() => {
                            // Intento alternativo: reproducir silenciado y luego activar volumen
                            try {
                                audioEl.muted = true;
                                const p2 = audioEl.play();
                                if (p2 && typeof p2.then === 'function') {
                                    p2.then(() => {
                                        setTimeout(() => { audioEl.muted = false; }, 300);
                                    }).catch(() => {
                                        showAudioError('El navegador bloqueó la reproducción automática. Pulsa reproducir en la barra de música.');
                                    });
                                }
                            } catch (e) {
                                showAudioError('No fue posible reproducir el audio.');
                            }
                        });
                    }
                }
            } catch (e) {}
            heart.style.transition = 'transform 0.6s ease';
            heart.style.transform = `rotate(-45deg) scale(${1 + clickCount*0.6})`;

            if (clickCount >= 4) {
                // Explota
                heart.style.transition = 'transform 0.4s ease, opacity 0.6s';
                heart.style.transform = 'scale(0)';
                heart.style.opacity = '0';
                explodeHeart();
                clickCount = 0;
                // Restaurar corazón después de la explosión (más tarde)
                setTimeout(() => {
                    heart.style.opacity = '1';
                    heart.style.transform = 'rotate(-45deg) scale(1)';
                }, 12000);
            }
        }

        heart.addEventListener('click', onHeartClick);
        // Ajuste inicial del audio y manejo de errores
        const audio = document.getElementById('bg-audio');
        try {
            if (audio) audio.volume = 0.7;
        } catch (e) {}

        // Mostrar aviso temporal si hay error de reproducción
        function showAudioError(msg) {
            let banner = document.getElementById('audio-error-banner');
            if (!banner) {
                banner = document.createElement('div');
                banner.id = 'audio-error-banner';
                banner.style.position = 'fixed';
                banner.style.left = '12px';
                banner.style.right = '12px';
                banner.style.bottom = '80px';
                banner.style.padding = '10px 14px';
                banner.style.background = 'rgba(255,20,147,0.95)';
                banner.style.color = 'white';
                banner.style.fontWeight = '700';
                banner.style.borderRadius = '8px';
                banner.style.zIndex = '9999';
                banner.style.textAlign = 'center';
                document.body.appendChild(banner);
            }
            banner.textContent = msg;
            banner.style.opacity = '1';
            setTimeout(() => {
                banner.style.transition = 'opacity 1s';
                banner.style.opacity = '0';
                setTimeout(() => banner.remove(), 1100);
            }, 4000);
        }

        if (audio) {
            audio.addEventListener('error', (ev) => {
                console.warn('Audio error', ev);
                showAudioError('No se pudo cargar el audio (comprueba la URL o la conexión).');
            });
        }
    </script>
</body>
</html>
