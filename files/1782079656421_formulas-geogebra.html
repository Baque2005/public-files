<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeoGebra Romantic Pack ❤️</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #ff0080, #7928ca);
      min-height: 100vh;
      color: white;
      padding: 30px;
    }

    h1 {
      text-align: center;
      font-size: 3rem;
      margin-bottom: 10px;
    }

    .subtitle {
      text-align: center;
      opacity: 0.9;
      margin-bottom: 40px;
      font-size: 1.1rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 25px;
    }

    .card {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 20px;
      transition: 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .card:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .card h2 {
      margin-bottom: 15px;
      font-size: 1.3rem;
      color: #fff;
    }

    .formula {
      background: rgba(0,0,0,0.3);
      padding: 15px;
      border-radius: 12px;
      font-family: Consolas, monospace;
      font-size: 0.95rem;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-word;
      margin-bottom: 15px;
    }

    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .copy-btn {
      background: #ff4fa3;
      color: white;
    }

    .share-btn {
      background: #7c4dff;
      color: white;
    }

    button:hover {
      transform: scale(1.05);
    }

    .footer {
      margin-top: 50px;
      text-align: center;
      opacity: 0.8;
      font-size: 0.95rem;
    }

    .heart {
      position: fixed;
      font-size: 20px;
      animation: float 6s linear infinite;
      opacity: 0.3;
      pointer-events: none;
    }

    @keyframes float {
      from {
        transform: translateY(100vh) rotate(0deg);
      }
      to {
        transform: translateY(-120vh) rotate(360deg);
      }
    }
  </style>
</head>
<body>

  <h1>❤️ GeoGebra Romantic Pack ❤️</h1>
  <p class="subtitle">Colección de fórmulas aesthetic para copiar y pegar en GeoGebra ✨</p>

  <div class="grid" id="cards"></div>

  <div class="footer">
    Hecho para dedicarte fórmulas - By TauroX 💖
  </div>

  <script>
    const formulas = [
      {
        title: '❤️ Corazón clásico',
        formula: '(x² + y² - 1)³ = x²y³'
      },
      {
        title: '💖 Corazón aesthetic',
        formula: 'y = abs(x)^(2/3) + 0.9*sqrt(3.3 - x²)*sin(8*pi*x)'
      },
      {
        title: '💘 Corazón con ondas',
        formula: 'g(x)=x^(2/3)+sqrt(3-x²)*sin(16*pi*x)'
      },
      {
        title: '💞 Corazón giratorio',
        formula: 'a=0\n(sin(a*pi/10)+x)^2+(cos(a*pi/10)+y)^2=1.2+0.7 abs(x)y'
      },
      {
        title: '🌸 Flor matemática',
        formula: 'Curve(sin(6t)cos(t), sin(6t)sin(t), t, 0, 2π)'
      },
      {
        title: '🌹 Rosa romántica',
        formula: 'Curve(cos(7t)*cos(t), cos(7t)*sin(t), t, 0, 2π)'
      },
      {
        title: '💓 Latido de corazón',
        formula: 'y = sin(x)*sqrt(abs(x))'
      },
      {
        title: '✨ Corazón doble',
        formula: '(x²+y²-1)^3-x²y³=0\n(x²+y²-0.8)^3=x²y³'
      },
      {
        title: '🌈 Espiral romántica',
        formula: 'Curve(t*cos(t), t*sin(t), t, 0, 10π)'
      },
      {
        title: '💫 Infinito elegante',
        formula: '(x²+y²)^2 = 4(x²-y²)'
      },
      {
        title: '🦋 Mariposa matemática',
        formula: 'Curve(sin(t)*(exp(cos(t))-2*cos(4t)-sin(t/12)^5), cos(t)*(exp(cos(t))-2*cos(4t)-sin(t/12)^5), t,0,12π)'
      },
      {
        title: '💗 Corazón relleno',
        formula: 'y ≤ abs(x)^(2/3)+sqrt(1-x²)'
      },
      {
        title: '🔥 Corazón PRO animado',
        formula: 'a=0\nCurve((1+0.2sin(20t+a))*16sin(t)^3,(1+0.2sin(20t+a))*(13cos(t)-5cos(2t)-2cos(3t)-cos(4t)),t,0,2π)'
      },
      {
        title: '🌷 Tulipán matemático',
        formula: 'Curve(sin(t)*(exp(cos(t))-2*cos(4t)), cos(t)*(exp(cos(t))-2*cos(4t)), t,0,6π)'
      },
      {
        title: '💕 Corazón neon',
        formula: 'y = sqrt(abs(x))*sin(20x)+sqrt(4-x²)'
      },
      {
        title: '🎇 Efecto hipnótico',
        formula: 'a=0\nCurve((2+sin(a+t))*cos(t),(2+sin(a+t))*sin(t),t,0,20π)'
      },
      {
        title: '💌 Corazón paramétrico',
        formula: 'Curve(16sin(t)^3,13cos(t)-5cos(2t)-2cos(3t)-cos(4t),t,0,2π)'
      },
      {
        title: '🌺 Flor de loto',
        formula: 'Curve(sin(5t)*cos(t),sin(5t)*sin(t),t,0,2π)'
      },
      {
        title: '🖤 Corazón pulsando',
        formula: 'a=1\nCurve(a*16sin(t)^3,a*(13cos(t)-5cos(2t)-2cos(3t)-cos(4t)),t,0,2π)'
      },
      {
        title: '💬 Texto romántico',
        formula: 'Text("Te amo ❤️", (0,0))'
      }
    ];

    const cards = document.getElementById('cards');

    formulas.forEach(item => {
      const card = document.createElement('div');
      card.className = 'card';

      card.innerHTML = `
        <h2>${item.title}</h2>
        <div class="formula">${item.formula}</div>
        <div class="buttons">
          <button class="copy-btn">
            <i class="fa-solid fa-copy"></i> Copiar
          </button>
          <button class="share-btn">
            <i class="fa-solid fa-share"></i> Compartir
          </button>
        </div>
      `;

      const copyBtn = card.querySelector('.copy-btn');
      const shareBtn = card.querySelector('.share-btn');

      copyBtn.addEventListener('click', async () => {
  const text = item.formula;

  // Método moderno (requiere HTTPS/localhost, puede fallar en file://)
  try {
    await navigator.clipboard.writeText(text);
    copyBtn.innerHTML = '<i class="fa-solid fa-check"></i> Copiado';
  } catch (err) {
    // Fallback para contextos no seguros (file://)
    const textarea = document.createElement('textarea');
    textarea.value = text;
    textarea.style.position = 'fixed';
    textarea.style.opacity = '0';
    document.body.appendChild(textarea);
    textarea.select();
    try {
      document.execCommand('copy');
      copyBtn.innerHTML = '<i class="fa-solid fa-check"></i> Copiado';
    } catch (e) {
      alert('No se pudo copiar 😿 Prueba seleccionando y copiando manualmente.');
    }
    document.body.removeChild(textarea);
  }

  // Restaurar el botón después de 1.5 segundos
  setTimeout(() => {
    copyBtn.innerHTML = '<i class="fa-solid fa-copy"></i> Copiar';
  }, 1500);
});

      shareBtn.addEventListener('click', async () => {
        if (navigator.share) {
          navigator.share({
            title: item.title,
            text: item.formula
          });
        } else {
          alert('Tu navegador no soporta compartir 😿');
        }
      });

      cards.appendChild(card);
    });

    function createHeart() {
      const heart = document.createElement('div');
      heart.classList.add('heart');
      heart.innerHTML = ['❤️','💖','💕','💘','💗'][Math.floor(Math.random()*5)];
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.animationDuration = (Math.random() * 3 + 4) + 's';
      heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 7000);
    }

    setInterval(createHeart, 400);
  </script>

</body>
</html>
