<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Una pregunta</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background: linear-gradient(135deg, #0f0f0f, #24123d);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            text-align: center;
            background: rgba(255,255,255,0.06);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(127,92,255,0.4);
        }

        h1 {
            color: #c7a6ff;
            margin-bottom: 25px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 25px;
        }

        button {
            border: none;
            border-radius: 30px;
            padding: 14px 28px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #si {
            background: #7f5cff;
            color: white;
            font-size: 1.1rem;
        }

        #no {
            background: #333;
            color: #ddd;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>¿Querés intentar algo conmigo?💕</h1>
    <div class="buttons">
        <button id="si" onclick="aceptar()">Sí</button>
        <button id="no" onclick="rechazar()">No</button>
    </div>
</div>

<script>
    let escala = 1;
    let textosNo = [
        "¿segura papoi?",
        "pensalo muy bien",
        "dale una oportunidad",
        "no es tan mala idea estar juntos",
        "última chance papoi"
    ];
    let intentos = 0;

    function rechazar() {
        escala += 0.2;
        document.getElementById("si").style.transform = `scale(${escala})`;

        if (intentos < textosNo.length) {
            document.getElementById("no").innerText = textosNo[intentos];
        } else {
            document.getElementById("no").innerText = "sabes que si quieres papoi🥺";
        }
        intentos++;
    }

    function aceptar() {
        document.body.innerHTML = `
            <div style="
                color:white;
                text-align:center;
                font-family:'Segoe UI', sans-serif;">
                <h1 style="color:#b18cff;">Sabía que dirias que si 💕</h1>
                <p>Prometo cuidarte y hacerte feliz te prometo que valdra la pena estar juntos seremos solo tu y yo papoi💕</p>
            </div>
        `;
    }
</script>

</body>
</html>
